name: Deploy DESA
on:
  push:
    branches:
      - desa
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar deploy en servidor DESA
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DESA_SERVER_IP }}
          username: ${{ secrets.DESA_SERVER_USER }}
          key: ${{ secrets.DESA_SSH_PRIVATE_KEY }}
          script: |
            /home/user_admin/sh/deploy.sh